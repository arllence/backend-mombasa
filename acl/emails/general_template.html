<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aga Khan Hospital Kisumu</title>
  <style>
    /* Reset styles */
    body, html {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      line-height: 1.6;
      background-color: #f4f4f4;
    }

    /* Container */
    .email-container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    /* Header */
    .header {
      background-color: #e2725b;
      color: #ffffff;
      text-align: center;
      padding: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: bold;
    }

    /* Body */
    .body-content {
      padding: 20px;
      color: #333333;
    }

    .body-content h2 {
      font-size: 20px;
      margin-bottom: 15px;
    }

    .body-content p {
      font-size: 16px;
      margin-bottom: 20px;
    }

    /* Call-to-action button */
    .cta-button {
      display: inline-block;
      background-color: #e2725b;
      color: #ffffff;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 4px;
      font-size: 16px;
      margin: 20px 0;
    }

    .cta-button:hover {
      background-color: #dcae96;
    }
	
	.signature-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 2rem;
        background: #fff;
        border-radius: 8px;
        /* box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); */
        text-align: left;
    }

    .signature-table th {
        border: 1px solid #ddd;
        padding: 0.5rem;
        font-size: 1rem;
        color: #181717;
        background-color: #f4f4f4;
    }

    .signature-table td {
        border: 1px solid #ddd;
        padding: 0.5rem;
        font-size: 1rem;
        color: #181717;
    }

    .signature-table td:first-child {
        font-weight: bold;
        background-color: #f4f4f4;
        color: #181717;
    }

    .signature-table tr:hover {
        background-color: #f9f9f9;
    }

    /* Footer */
    .footer {
      background-color: #f4f4f4;
      text-align: center;
      padding: 15px;
      font-size: 14px;
      color: #777777;
    }

    .footer a {
      color: #007BFF;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* Responsive design */
    @media (max-width: 600px) {
      .email-container {
        width: 100%;
        border-radius: 0;
      }

      .header h1 {
        font-size: 20px;
      }

      .body-content h2 {
        font-size: 18px;
      }

      .body-content p {
        font-size: 14px;
      }

      .cta-button {
        font-size: 14px;
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="email-container">
    <!-- Header -->
    <div class="header">
      <h1>Aga Khan Hospital, Kisumu</h1>
    </div>

    <!-- Body Content -->
    <div class="body-content">
      ${CONTENT}
      <br>
      <a href=${LINK} class="cta-button" style="text-decoration:none; color: #fff;">${PLATFORM}</a>
    </div>

    <!-- Footer -->
    <div class="footer">
      <!-- <p>
        You received this email because you signed up. If you no longer wish to receive these emails, <a href="#">unsubscribe here</a>.
      </p> -->
      <p>
        &copy; 2025. All rights reserved.
      </p>
    </div>
  </div>
</body>
</html>
