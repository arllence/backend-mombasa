stages:
  - deploy

deploy_backend:
  stage: deploy
  tags:
    - backend  # 🏷️ This must match your GitLab Runner's tag
  only:
    - main  # 🔁 Replace with your deploy branch if different
  before_script:
  - echo "🔐 Setting up SSH authentication"
  - mkdir -p ~/.ssh
  - echo "$GITHUB_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
  - chmod 600 ~/.ssh/id_rsa
  - ssh-keyscan github.com >> ~/.ssh/known_hosts
  - ssh -T git@github.com
  script:
    - echo "📁 Navigating to project directory..."
    - cd /opt/psmdqs/mms-backend

    - echo "✅ Marking directory as safe for Git"
    - git config --global --add safe.directory /opt/psmdqs/mms-backend

    - echo "📥 Pulling latest code from GitHub..."
    - git pull origin main

    - echo "🐍 Activating virtual environment..."
    - source /opt/psmdqs/mms-backend/venv/bin/activate

    - echo "🛠 Running Django migrations..."
    - python manage.py migrate --noinput

    - echo "🚀 Restarting Gunicorn via Supervisor..."
    - sudo /usr/bin/supervisorctl reload

    - echo "✅ Deployment complete!"
